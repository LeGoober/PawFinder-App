name: pawfinder_app
description: "PawFinder — Community-Driven Lost Pet Recovery Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.7

  # Networking
  dio: ^5.4.0
  json_annotation: ^4.8.1
  connectivity_plus: ^5.0.2
  cached_network_image: ^3.3.0

  # Local Storage  
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Maps & Location
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  latlong2: ^0.9.0

  # Notifications
  flutter_local_notifications: ^16.3.0

  # UI Components
  flutter_screenutil: ^5.9.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.0
  permission_handler: ^11.1.0
  url_launcher: ^6.2.0
  share_plus: ^7.2.0
  path_provider: ^2.1.1
  logger: ^2.0.2
  dartz: ^0.10.1

  # Routing
  go_router: ^14.0.0

  # Icons
  phosphor_flutter: ^2.0.0
  cupertino_icons: ^1.0.6

  # Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
