# Upstream: API Gateway on Render
# If the Flutter app ever makes relative-path API calls (localhost fallback),
# nginx proxies them to prod so the app works even if the JS build is stale.
upstream api_gateway {
    server pawfinder-api-gateway.onrender.com:443;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API proxy — catches relative-path API calls ──────────
    # If the Flutter JS attempts /api/* or /ws (e.g., old build with
    # localhost default), nginx forwards to the production gateway.
    location /api/ {
        proxy_pass https://api_gateway;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host pawfinder-api-gateway.onrender.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    location /ws {
        proxy_pass https://api_gateway;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host pawfinder-api-gateway.onrender.com;
        proxy_read_timeout 86400s;
    }

    # Cache static assets aggressively (hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
    }
}
