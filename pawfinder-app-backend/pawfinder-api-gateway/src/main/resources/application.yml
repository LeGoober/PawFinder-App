server:
  port: 8080

spring:
  application:
    name: pawfinder-api-gateway
  main:
    web-application-type: reactive
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      # Routes moved to application-prod.yml to avoid duplicate-route conflict
      # (Spring Boot merges list properties across profiles, causing base
      #  localhost routes to shadow prod routes with env-var URIs).
      # For local dev, set SPRING_PROFILES_ACTIVE=prod or use the defaults
      # in application-prod.yml which fall back to localhost if env vars aren't set.

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      authCircuitBreaker:
        base-config: default
      alertCircuitBreaker:
        base-config: default
      sightingCircuitBreaker:
        base-config: default
      petCircuitBreaker:
        base-config: default
      conversationCircuitBreaker:
        base-config: default
      messageCircuitBreaker:
        base-config: default
      rewardCircuitBreaker:
        base-config: default
      mediaCircuitBreaker:
        base-config: default
      dashboardCircuitBreaker:
        base-config: default
      leaderboardCircuitBreaker:
        base-config: default
      badgeCircuitBreaker:
        base-config: default
      wsCircuitBreaker:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.pawfinder: DEBUG
    org.springframework.cloud.gateway: DEBUG
