server:
  port: 8080

spring:
  application:
    name: pawfinder-api-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20
        - id: core-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/alerts/**,/api/v1/sightings/**,/api/v1/pets/**
        - id: messaging-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/conversations/**,/api/v1/messages/**
        - id: reward-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/rewards/**
        - id: media-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/media/**
        - id: analytics-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/dashboard/**,/api/v1/leaderboard/**,/api/v1/badges/**

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10000
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      authCircuitBreaker:
        base-config: default
      alertCircuitBreaker:
        base-config: default
      sightingCircuitBreaker:
        base-config: default
      petCircuitBreaker:
        base-config: default
      conversationCircuitBreaker:
        base-config: default
      messageCircuitBreaker:
        base-config: default
      rewardCircuitBreaker:
        base-config: default
      mediaCircuitBreaker:
        base-config: default
      dashboardCircuitBreaker:
        base-config: default
      leaderboardCircuitBreaker:
        base-config: default
      badgeCircuitBreaker:
        base-config: default
      wsCircuitBreaker:
        base-config: default

  timelimiter:
    configs:
      default:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.pawfinder: DEBUG
    org.springframework.cloud.gateway: DEBUG
