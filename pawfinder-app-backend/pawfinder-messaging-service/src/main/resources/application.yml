server:
  port: 8083

spring:
  application:
    name: pawfinder-messaging-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/pawfinder}
    username: ${POSTGRES_USER:pawfinder}
    password: ${POSTGRES_PASSWORD:pawfinder_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_messaging_history
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: ${JWT_SECRET:pawfinder-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pawfinder: DEBUG
