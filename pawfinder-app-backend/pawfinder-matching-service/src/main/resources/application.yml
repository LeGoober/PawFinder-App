server:
  port: 8087

spring:
  application:
    name: pawfinder-matching-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/pawfinder}
    username: ${POSTGRES_USER:pawfinder}
    password: ${POSTGRES_PASSWORD:pawfinder_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: false

jwt:
  secret: ${JWT_SECRET:your_256_bit_secret_key_here_change_in_production}
  expiration: ${JWT_EXPIRATION:86400000}

aws:
  region: ${AWS_REGION:us-east-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:your_access_key}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:your_secret_key}
  rekognition:
    collection-id: pawfinder-pets
    similarity-threshold: 80

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pawfinder.matching: DEBUG
