server:
  port: 8082

spring:
  application:
    name: pawfinder-alert-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/pawfinder}
    username: ${POSTGRES_USER:pawfinder}
    password: ${POSTGRES_PASSWORD:pawfinder_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASS:guest}

jwt:
  secret: ${JWT_SECRET:pawfinder-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pawfinder: DEBUG
