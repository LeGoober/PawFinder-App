# ────────────────────────────────────────────────────────────
# Auth Service — Production Overrides (activated by SPRING_PROFILES_ACTIVE=prod)
# ────────────────────────────────────────────────────────────

server:
  port: ${PORT:8080}

spring:
  # Database — Render provides SPRING_DATASOURCE_* env vars
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  # Redis — Upstash (set REDIS_URL on Render)
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  flyway:
    enabled: true

# JWT (secret auto-generated by Render)
jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    com.pawfinder: INFO
    org.springframework.security: DEBUG
