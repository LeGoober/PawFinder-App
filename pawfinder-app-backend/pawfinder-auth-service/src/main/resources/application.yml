server:
  port: 8081

spring:
  application:
    name: pawfinder-auth-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/pawfinder}
    username: ${POSTGRES_USER:pawfinder}
    password: ${POSTGRES_PASSWORD:pawfinder_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:pawfinder-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
  access-token-expiration: 86400000
  refresh-token-expiration: 604800000

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID:test}
  auth-token: ${TWILIO_AUTH_TOKEN:test}
  phone-number: ${TWILIO_PHONE_NUMBER:+1234567890}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.pawfinder: DEBUG
