server:
  port: 8086

spring:
  application:
    name: pawfinder-analytics-service
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5433/pawfinder}
    username: ${POSTGRES_USER:pawfinder}
    password: ${POSTGRES_PASSWORD:pawfinder_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_analytics_history
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret: ${JWT_SECRET:your_256_bit_secret_key_here_change_in_production}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.pawfinder.analytics: DEBUG
