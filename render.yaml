# ────────────────────────────────────────────────────────────
# PawFinder V0.1 — Render Blueprint
# ────────────────────────────────────────────────────────────
# Deploy: push to GitHub → Render auto-deploys via this file.
# Managed services used instead of containerized infra.
#
# Each backend service uses a PER-SERVICE Dockerfile
# (e.g., Dockerfile.auth-service) because Render Blueprint
# does not support --build-arg for Docker builds.
# The generic Dockerfile (with ARG SERVICE_NAME) is for
# local/manual builds only.
#
# For per-service control and better error visibility,
# use the CLI/API deployment path described in
# docs/DEPLOYMENT.md (Path D).
#
# Services:
#   1. Frontend    — Flutter Web via Nginx (Web Service)
#   2. API Gateway — Spring Boot Web Service (WebFlux)
#   3. Auth        — Spring Boot Web Service
#   4. Alert       — Spring Boot Web Service (PostGIS)
#   5. Messaging   — Spring Boot Web Service
#   6. Reward      — Spring Boot Web Service (Stripe)
#   7. Media       — Spring Boot Web Service (AWS S3)
#   8. Analytics   — Spring Boot Web Service
#   9. Matching    — Spring Boot Web Service (AWS Rekognition)
#  10. Notification— Spring Boot Web Service (FCM + SendGrid)
#
# Note: For cost efficiency on V0.1, deploy only the services
#       you need. See docs/DEPLOYMENT.md for all paths.
# ────────────────────────────────────────────────────────────

services:
  # ── Frontend ───────────────────────────────────────────────
  - type: web
    name: pawfinder-frontend
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder_app_frontend
    dockerfilePath: Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: FLUTTER_VERSION
        value: "3.41.6"

  # ── API Gateway ────────────────────────────────────────────
  - type: web
    name: pawfinder-api-gateway
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.api-gateway
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AUTH_SERVICE_URL
        fromService:
          name: pawfinder-auth-service
          type: web
          property: hostport
      - key: ALERT_SERVICE_URL
        fromService:
          name: pawfinder-alert-service
          type: web
          property: hostport
      - key: MESSAGING_SERVICE_URL
        fromService:
          name: pawfinder-messaging-service
          type: web
          property: hostport
      - key: REWARD_SERVICE_URL
        fromService:
          name: pawfinder-reward-service
          type: web
          property: hostport
      - key: MEDIA_SERVICE_URL
        fromService:
          name: pawfinder-media-service
          type: web
          property: hostport
      - key: ANALYTICS_SERVICE_URL
        fromService:
          name: pawfinder-analytics-service
          type: web
          property: hostport
      - key: MATCHING_SERVICE_URL
        fromService:
          name: pawfinder-matching-service
          type: web
          property: hostport
      - key: NOTIFICATION_SERVICE_URL
        fromService:
          name: pawfinder-notification-service
          type: web
          property: hostport
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    disk:
      name: gateway-logs
      mountPath: /app/logs

  # ── Auth Service ───────────────────────────────────────────
  - type: web
    name: pawfinder-auth-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.auth-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pawfinder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pawfinder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pawfinder-db
          property: password
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

  # ── Alert Service (core) ───────────────────────────────────
  - type: web
    name: pawfinder-alert-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.alert-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pawfinder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pawfinder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pawfinder-db
          property: password
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Messaging Service ──────────────────────────────────────
  - type: web
    name: pawfinder-messaging-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.messaging-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pawfinder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pawfinder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pawfinder-db
          property: password
      - key: JWT_SECRET
        sync: false

  # ── Reward Service ─────────────────────────────────────────
  - type: web
    name: pawfinder-reward-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.reward-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pawfinder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pawfinder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pawfinder-db
          property: password
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Media Service ──────────────────────────────────────────
  - type: web
    name: pawfinder-media-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.media-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: JWT_SECRET
        sync: false

  # ── Analytics Service ──────────────────────────────────────
  - type: web
    name: pawfinder-analytics-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.analytics-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: pawfinder-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: pawfinder-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: pawfinder-db
          property: password
      - key: JWT_SECRET
        sync: false

  # ── Matching Service ───────────────────────────────────────
  - type: web
    name: pawfinder-matching-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.matching-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REKOGNITION_REGION
        value: us-east-1
      - key: JWT_SECRET
        sync: false

  # ── Notification Service ───────────────────────────────────
  - type: web
    name: pawfinder-notification-service
    runtime: docker
    repo: https://github.com/LeGoober/PawFinder-App
    rootDir: pawfinder-app-backend
    dockerfilePath: Dockerfile.notification-service
    buildFilter:
      paths:
        - pawfinder-app-backend/**
    plan: starter
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: FIREBASE_SERVER_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false

  # ── Managed Redis ──────────────────────────────────────────
  - type: redis
    name: pawfinder-redis
    plan: starter
    ipAllowList: []

# ═══════════════════════════════════════════════════════════════
# Managed Databases
# ═══════════════════════════════════════════════════════════════

databases:
  - name: pawfinder-db
    databaseName: pawfinder
    plan: starter
    ipAllowList: []
